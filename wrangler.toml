compatibility_date = "2026-07-01"
main = "worker.js"
name = "x"
preview_urls = false

# Text module rules：把 .css 文件作为纯文本字符串导入 worker.js，
# 内联到最终 HTML 的 <style> 标签里，彻底消除外部引用，
# 让每条路由渲染的页面都完全自包含、不受混合内容拦截。
rules = [{ type = "Text", globs = ["**/*.css"], fallthrough = true }]

[vars]
TIMEZONE = "Asia/Shanghai"
TRANSLATE_TO = "zh-cn"

# Enable logs
[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1
