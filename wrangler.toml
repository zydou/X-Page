compatibility_date = "2026-07-01"
main = "worker.js"
name = "x"
preview_urls = false

# 把 .css 文件作为字符串导入到 Worker（worker.js 里 `import WATER_CSS from "./water.css"`）
rules = [{ type = "Text", globs = ["**/*.css"], fallthrough = true }]

[vars]
TIMEZONE = "Asia/Shanghai"
TRANSLATE_TO = "zh-cn"

# Enable logs
[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1

