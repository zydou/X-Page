---
name: Deploy

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/deploy.yaml
      - worker.js
      - twitter.css
      - wrangler.toml

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@main

      - name: Fetch water.css
        run: curl -fsSL https://cdn.jsdelivr.net/npm/water.css@2/out/water.css -o water.css

      - name: Compress CSS
        run: npx esbuild *.css --minify --outdir=. --allow-overwrite

      - name: Deploy
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      # wrangler 部署会重置 Worker Cache 运行时开关为默认值（禁用）。
      # 通过 endpoint /workers/scripts/{name}/settings（multipart form-data）重新启用
      # 文档: https://developers.cloudflare.com/api/resources/workers/subresources/scripts/subresources/script_and_version_settings/methods/edit/
      # 注意：CLOUDFLARE_API_TOKEN 权限需要包含 Workers Scripts:Edit
      - name: Re-enable Worker Cache
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          # 1. 从 wrangler.toml 读取 Worker name
          SCRIPT_NAME=$(python3 -c "import tomllib;print(tomllib.load(open('wrangler.toml','rb'))['name'])")
          echo "Worker name: $SCRIPT_NAME"

          # 2. 从 API Token 推导出 Account ID
          ACCOUNT_ID=$(curl -sS -H "Authorization: Bearer $CF_API_TOKEN" "https://api.cloudflare.com/client/v4/accounts" | python3 -c "import sys,json;d=json.load(sys.stdin);print(d['result'][0]['id'] if d.get('result') else '')")
          if [ -z "$ACCOUNT_ID" ]; then echo "Failed to get account"; exit 1; fi
          echo "Account: $ACCOUNT_ID"

          # 3. PATCH /workers/scripts/{name}/settings，multipart form 中 settings 字段 = JSON
          RESP=$(curl -sS -X PATCH -H "Authorization: Bearer $CF_API_TOKEN" -F 'settings={"cache_options":{"enabled":true}}' "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/workers/scripts/$SCRIPT_NAME/settings")
          echo "$RESP" | python3 -c "import sys,json;d=json.load(sys.stdin);ok=d.get('success');c=d.get('result',{}).get('cache_options',{});print('cache.enabled =',c.get('enabled') if ok else 'FAIL');sys.exit(0 if ok and c.get('enabled') else 1)" && echo "Cache re-enabled" || (echo "Failed"; echo "$RESP"; exit 1)
